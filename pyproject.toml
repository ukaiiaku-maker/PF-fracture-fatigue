[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "arrhenius-sharp-front-mpz"
version = "10.1.9.1"
description = "Scale-preserving post-initiation tip-geometry source feedback referenced to r0"
requires-python = ">=3.10"
dependencies = ["numpy>=1.24", "scipy>=1.10", "matplotlib>=3.7"]

[project.optional-dependencies]
test = ["pytest>=7"]

[tool.setuptools]
packages = ["arrhenius_fracture"]

[tool.pytest.ini_options]
testpaths = ["tests"]

[tool.setuptools.package-data]
arrhenius_fracture = ["data/materials/*/*.csv"]

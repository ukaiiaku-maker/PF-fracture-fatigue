name: Legacy phase-field inventory audit

on:
  push:
    branches:
      - v10.2.9-pf-czm-consistency-hardening
  pull_request:
    branches:
      - v10.2.8-staged-analytical-firstpass-rcurve-2d

jobs:
  inventory:
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Inventory legacy phase-field references
        shell: bash
        run: |
          set +e
          git archive --format=tar.gz -o branch_source.tar.gz HEAD
          find . -path './.git' -prune -o -type f -print | sort > all_files.txt
          grep -RIlEi --exclude-dir=.git --exclude='legacy-phasefield-audit.yml' '(^|[^[:alnum:]_])AT[-_ ]?[12]([^[:alnum:]_]|$)' . | sort > legacy_phasefield_files.txt
          grep -RInEi --exclude-dir=.git --exclude='legacy-phasefield-audit.yml' '(^|[^[:alnum:]_])AT[-_ ]?[12]([^[:alnum:]_]|$)' . > legacy_phasefield_matches.txt
          grep -Ei '(^|/)(AT[-_ ]?[12]|at[-_ ]?[12])([^[:alnum:]_]|$)' all_files.txt > legacy_phasefield_filenames.txt
          true
      - uses: actions/upload-artifact@v4
        with:
          name: pf-legacy-phasefield-inventory-${{ github.run_id }}
          path: |
            branch_source.tar.gz
            legacy_phasefield_files.txt
            legacy_phasefield_matches.txt
            legacy_phasefield_filenames.txt
          if-no-files-found: error

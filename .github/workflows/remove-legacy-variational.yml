name: Remove legacy variational fracture subsystem

permissions:
  contents: write

on:
  push:
    branches:
      - v10.2.9-pf-czm-consistency-hardening

jobs:
  remove:
    if: ${{ !contains(github.event.head_commit.message, '[legacy-cleanup]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      - name: Install test dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[test]"
      - name: Remove legacy subsystem
        shell: bash
        run: |
          echo '' | base64 --decode | gzip --decompress > /tmp/remove_legacy_variational.py
          python /tmp/remove_legacy_variational.py
      - name: Compile and test cleaned tree
        run: |
          python -m compileall -q arrhenius_fracture *.py scripts
          PYTHONPATH=$PWD python -m pytest -q
      - name: Commit cleaned tree
        shell: bash
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git diff --cached --stat
          git commit -m "Remove legacy variational fracture subsystem [legacy-cleanup]"
          git push origin HEAD:v10.2.9-pf-czm-consistency-hardening

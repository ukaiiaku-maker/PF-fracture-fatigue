name: Publish v10.0 baseline

on:
  pull_request:
    branches: [main]
    types: [opened, synchronize, reopened]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  publish:
    if: github.event_name == 'workflow_dispatch' || startsWith(github.head_ref, 'v10.0-')
    runs-on: ubuntu-latest
    timeout-minutes: 20
    env:
      GH_TOKEN: ${{ github.token }}

    steps:
      - name: Materialize, validate, and publish
        shell: bash
        run: |
          set -euxo pipefail
          work="$RUNNER_TEMP/pf-v10"
          git clone --quiet --branch v10.0-unified-sharp-front-mpz \
            "https://x-access-token:${GH_TOKEN}@github.com/${GITHUB_REPOSITORY}.git" \
            "$work"
          cd "$work"

          sed -i "/p.add_argument('--mpz-n-bins', type=int, default=200)/d" \
            .bootstrap/materialize_v10.py
          python .bootstrap/materialize_v10.py
          python -m pip install -q -e ".[test]"
          OUT=runs/ci_preflight bash scripts/run_v10_preflight.sh

          rm -rf .bootstrap .github/workflows/materialize-v10.yml
          mkdir -p .github/workflows
          cat > .github/workflows/ci.yml <<'YAML'
          name: v10 sharp-front MPZ CI

          on:
            push:
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                - run: python -m pip install -e ".[test]"
                - run: python -m compileall -q arrhenius_fracture
                - env:
                    OUT: runs/ci_preflight
                  run: bash scripts/run_v10_preflight.sh
          YAML

          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          tree=$(git write-tree)
          commit=$(printf '%s\n' \
            'v10.0 unified anisotropic sharp-front MPZ baseline [materialized]' \
            | git commit-tree "$tree")
          git push --force origin \
            "$commit:refs/heads/v10.0-unified-sharp-front-mpz"

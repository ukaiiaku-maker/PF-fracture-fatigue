name: Verify v10.1.7.6 four-candidate shielding scout

on:
  push:
    branches:
      - v10.1.7.6-four-candidate-shielding-scout
  pull_request:
    branches:
      - v10.1.7.5-reduced-candidate-transfer-gate

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install package and tests
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e . pytest pandas
      - name: Compile scout tools
        run: |
          python -m compileall -q \
            scripts/prepare_v10_1_7_6_shielding_scout.py \
            scripts/analyze_v10_1_7_6_shielding_scout.py
          bash -n scripts/run_v10_1_7_6_four_candidate_shielding_scout.sh
      - name: Run shielding-scout tests
        run: |
          python -m pytest -q \
            tests/test_four_candidate_shielding_scout_v10176.py \
            tests/test_reduced_candidate_transfer_v10175.py \
            tests/test_anisotropic_emission_v10174.py

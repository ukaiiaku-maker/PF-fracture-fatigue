name: v10.0.1 2D driving audit

on:
  pull_request:
    branches:
      - v10.0.1-ci-diagnostic-base
  workflow_dispatch:

permissions:
  contents: read

jobs:
  audit:
    runs-on: ubuntu-latest
    timeout-minutes: 30
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test]"
      - run: python -m compileall -q arrhenius_fracture
      - run: python scripts/diagnose_v10_0_1_2d.py
      - uses: actions/upload-artifact@v4
        with:
          name: v10-0-1-2d-driving-audit
          path: v10_0_1_2d_driving_audit.json

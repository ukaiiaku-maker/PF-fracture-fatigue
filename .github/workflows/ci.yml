name: v10 sharp-front MPZ CI

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - run: python -m pip install -e ".[test]"
      - run: python -m compileall -q arrhenius_fracture
      - env:
          OUT: runs/ci_preflight
        run: bash scripts/run_v10_preflight.sh

name: Materialize v10.0 baseline

on:
  push:
    branches:
      - v10.0-unified-sharp-front-mpz
    paths:
      - ".bootstrap/**"
      - ".github/workflows/materialize-v10.yml"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  materialize:
    if: github.event_name == 'workflow_dispatch' || !contains(github.event.head_commit.message, '[materialized]')
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Check out bootstrap branch
        uses: actions/checkout@v4
        with:
          ref: v10.0-unified-sharp-front-mpz
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Materialize pinned source
        run: python .bootstrap/materialize_v10.py

      - name: Install package and test dependencies
        run: python -m pip install -e ".[test]"

      - name: Run integrated v10 preflight
        env:
          OUT: runs/ci_preflight
        run: bash scripts/run_v10_preflight.sh

      - name: Write permanent CI workflow
        run: |
          rm -rf .bootstrap .github/workflows/materialize-v10.yml
          mkdir -p .github/workflows
          cat > .github/workflows/ci.yml <<'YAML'
          name: v10 sharp-front MPZ CI

          on:
            push:
            pull_request:
            workflow_dispatch:

          permissions:
            contents: read

          jobs:
            test:
              runs-on: ubuntu-latest
              timeout-minutes: 20
              steps:
                - uses: actions/checkout@v4
                - uses: actions/setup-python@v5
                  with:
                    python-version: "3.12"
                - run: python -m pip install -e ".[test]"
                - run: python -m compileall -q arrhenius_fracture
                - env:
                    OUT: runs/ci_preflight
                  run: bash scripts/run_v10_preflight.sh
          YAML

      - name: Publish clean root commit
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          tree=$(git write-tree)
          commit=$(printf '%s\n' \
            'v10.0 unified anisotropic sharp-front MPZ baseline [materialized]' \
            | git commit-tree "$tree")
          git push --force origin \
            "$commit:refs/heads/v10.0-unified-sharp-front-mpz"

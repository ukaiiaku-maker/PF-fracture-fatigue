name: Fix legacy label guard

permissions:
  contents: write

on:
  push:
    branches:
      - v10.2.9-pf-czm-consistency-hardening

jobs:
  fix:
    if: ${{ !contains(github.event.head_commit.message, '[guard-fixed]') }}
    runs-on: ubuntu-24.04
    steps:
      - uses: actions/checkout@v4
      - name: Narrow guard to actual identifiers
        run: |
          python - <<'PY'
          from pathlib import Path
          path = Path('tests/test_no_legacy_variational_modules.py')
          text = path.read_text()
          old = '[-_ ]?[12]'
          new = '[-_]?[12]'
          if old not in text:
              raise SystemExit('guard pattern not found')
          path.write_text(text.replace(old, new))
          Path('.github/workflows/fix-legacy-label-guard.yml').unlink()
          PY
      - name: Commit correction
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add -A
          git commit -m "Match only compact legacy model identifiers [guard-fixed]"
          git push origin HEAD:v10.2.9-pf-czm-consistency-hardening
